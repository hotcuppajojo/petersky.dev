# .github/workflows/deploy.yml
name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Rust Toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Resolve Trunk Version
        id: trunk-version
        run: |
          version=$(tr -d '[:space:]' < tools/trunk.version)

          if [ -z "$version" ]; then
            echo "tools/trunk.version is empty"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Using trunk $version"

      - name: Cache Cargo Registry and Build Output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            tools/target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'tools/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache Trunk Binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/trunk
          key: trunk-${{ runner.os }}-${{ steps.trunk-version.outputs.version }}-${{ hashFiles('tools/trunk.version') }}

      - name: Install Trunk if Needed
        run: |
          expected="${{ steps.trunk-version.outputs.version }}"
          installed=$(trunk --version 2>/dev/null | awk '{print $2}' || true)

          if [ "$installed" != "$expected" ]; then
            cargo install trunk --version "$expected" --locked --force
          fi

          trunk --version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install npm Dependencies
        run: npm ci

      - name: Lint Rust Codebase
        run: cargo fmt -- --check

      - name: Run Rust Tests
        run: cargo test --release

      - name: Compile SCSS to CSS
        run: npm run build:sass

      - name: Build Site with Trunk
        run: trunk build --release

      - name: Move Compiled CSS to Deployment Directory
        run: |
          mkdir -p target/site/pkg/style
          cp style/main.css target/site/pkg/style/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/pkg